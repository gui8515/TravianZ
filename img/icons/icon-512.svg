<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc5200;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="#2a2a2a"/>
  <!-- Icon circle with gradient -->
  <circle cx="256" cy="256" r="220" fill="url(#grad512)"/>
  <!-- Fortification/Tower design -->
  <g fill="#ffffff">
    <!-- Left tower -->
    <rect x="80" y="185" width="80" height="210" rx="10"/>
    <polygon points="80,185 40,130 160,130"/>
    <!-- Center tower (tall) -->
    <rect x="216" y="100" width="80" height="295" rx="10"/>
    <polygon points="216,100 176,25 256,25 336,25 296,100"/>
    <!-- Right tower -->
    <rect x="352" y="185" width="80" height="210" rx="10"/>
    <polygon points="352,185 392,130 432,130"/>
    <!-- Base platform -->
    <rect x="50" y="385" width="412" height="40" rx="5"/>
    <!-- Details -->
    <rect x="100" y="220" width="15" height="60" fill="#ffcc00"/>
    <rect x="196" y="140" width="15" height="80" fill="#ffcc00"/>
    <rect x="396" y="220" width="15" height="60" fill="#ffcc00"/>
  </g>
  <!-- Game piece on top -->
  <circle cx="256" cy="330" r="20" fill="#ffcc00" stroke="#ffffff" stroke-width="4"/>
</svg>
