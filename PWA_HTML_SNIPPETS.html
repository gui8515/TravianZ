<!-- ============================================================================
     SNIPPET 2: ADD TO </body> SECTION
     ============================================================================
     Location: Just before </body> closing tag (or in footer.tpl template)
     
     This registers the Service Worker and enables offline support:
-->

<script>
  // Progressive Web App - Service Worker Registration
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/sw.js')
        .then(function(registration) {
          console.log('[PWA] Service Worker registered successfully', registration);
          
          // Check for updates every 60 seconds
          setInterval(() => {
            registration.update();
          }, 60000);
          
          // Notify if update is available
          if (registration.waiting) {
            console.log('[PWA] ⚠ Service Worker update available');
          }
        })
        .catch(function(error) {
          console.error('[PWA] ✗ Service Worker registration failed:', error);
        });
    });
    
    // Reload page when SW is updated
    let refreshing;
    navigator.serviceWorker.addEventListener('controllerchange', function() {
      if (refreshing) return;
      refreshing = true;
      console.log('[PWA] Reloading page due to Service Worker update...');
      window.location.reload();
    });
  }
</script>

<!-- ============================================================================
     QUICK REFERENCE: WHAT EACH PART DOES
     ============================================================================

1. <link rel="manifest">
   - Points to manifest.json
   - Provides app metadata (name, icons, colors)
   - Enables "Add to Home Screen" on mobile

2. <meta name="theme-color">
   - Sets the color of browser/app UI
   - Matches your app's brand color
   - Value: #2a2a2a (dark gray, Travian style)

3. <meta name="mobile-web-app-capable">
   - Enables standalone app mode on Android
   - Hides browser UI when launched from home screen

4. <meta name="apple-mobile-web-app-capable">
   - Same as above but for iOS Safari
   - Makes app appear native on iPad/iPhone

5. <meta name="apple-mobile-web-app-title">
   - Short name shown under home screen icon on iOS
   - Different from page title, must be short

6. <link rel="apple-touch-icon">
   - Icon used when bookmarking on iOS
   - Displayed on home screen and spotlight search

7. <meta name="viewport">
   - Controls how page displays on mobile
   - viewport-fit=cover: Uses entire screen (notch support)
   - user-scalable=yes: Allows pinch-to-zoom

8. navigator.serviceWorker.register('/sw.js')
   - Registers the service worker script
   - Enables all offline/caching features
   - Updates checked every 60 seconds

============================================================================ -->
