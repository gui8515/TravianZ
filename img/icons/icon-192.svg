<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc5200;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" fill="#2a2a2a"/>
  <!-- Icon circle with gradient -->
  <circle cx="96" cy="96" r="85" fill="url(#grad)"/>
  <!-- Fortification/Tower design -->
  <g fill="#ffffff">
    <!-- Left tower -->
    <rect x="30" y="70" width="30" height="80" rx="4"/>
    <polygon points="30,70 15,50 45,50"/>
    <!-- Center tower (tall) -->
    <rect x="81" y="40" width="30" height="110" rx="4"/>
    <polygon points="81,40 66,15 96,15 126,15 111,40"/>
    <!-- Right tower -->
    <rect x="132" y="70" width="30" height="80" rx="4"/>
    <polygon points="132,70 147,50 162,50"/>
    <!-- Base platform -->
    <rect x="20" y="145" width="152" height="15" rx="2"/>
  </g>
  <!-- Game piece on top -->
  <circle cx="96" cy="130" r="8" fill="#ffcc00" stroke="#ffffff" stroke-width="2"/>
</svg>
